name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - install/prod

jobs:
  build_and_deploy_job:
    runs-on: ubuntu-latest
    name: Build and Deploy Job Prod
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false
          lfs: false

      # --- Activar Corepack y preparar pnpm ---
      - run: corepack enable && corepack prepare pnpm@latest --activate
        name: Enable Corepack (pnpm)
        
      # --- Instalar dependencias ---
      - run: pnpm install
        name: Install dependencies

      # --- Build estático (SPA) ---
      - run: pnpm generate
        name: Build static site          

      - name: Copy staticwebapp.config.json to output
        run: cp staticwebapp.config.json .output/public/staticwebapp.config.json

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_YELLOW_STONE_09114C11E }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          # 🚫 No construyas con Oryx (evita npm install interno)
          skip_app_build: true
          skip_api_build: true
          app_location: ".output/public"
          output_location: ""                # vacío cuando saltas el build
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          api_location: ".output/server" # Api source code path - optional
          ###### End of Repository/Build Configurations ######
        env:
          ALLOWED_DOMAIN: "haley.es"